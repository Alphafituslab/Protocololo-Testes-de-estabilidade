version: "3.9"

  services:
    db:
      image: postgres:16-alpine
      container_name: alphafitus_db
      restart: always
      environment:
        POSTGRES_USER: alphafitus
        POSTGRES_PASSWORD: ${DB_PASSWORD:-alphafitus2024}
        POSTGRES_DB: alphafitus
      volumes:
        - db_data:/var/lib/postgresql/data
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U alphafitus"]
        interval: 10s
        timeout: 5s
        retries: 5

    api:
      build:
        context: ../..
        dockerfile: installer/protocolo/Dockerfile
      image: alphafitus_app:latest
      container_name: alphafitus_api
      restart: always
      depends_on:
        db:
          condition: service_healthy
      environment:
        NODE_ENV: production
        DATABASE_URL: postgresql://alphafitus:${DB_PASSWORD:-alphafitus2024}@db:5432/alphafitus
        PORT: 8080
        SESSION_SECRET: ${SESSION_SECRET:-troque_esta_chave_por_algo_seguro_2024}
        MASTER_PASSWORD: ${MASTER_PASSWORD:-admin123}
        BACKUP_DIR: /backups
      volumes:
        - backups:/backups
        - google_drive_sync:/backups/googledrive
      ports:
        - "${HTTP_PORT:-80}:80"

    nginx:
      image: nginx:alpine
      container_name: alphafitus_nginx
      restart: always
      depends_on:
        - api
      ports:
        - "${HTTP_PORT:-80}:80"
      volumes:
        - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

  volumes:
    db_data:   { name: alphafitus_db_data }
    backups:   { name: alphafitus_backups }
    google_drive_sync:
      driver: local
      driver_opts:
        type: none
        o: bind
        device: ${GOOGLE_DRIVE_PATH:-C:/Users/Public/GoogleDrive/Alphafitus-Backup}
  