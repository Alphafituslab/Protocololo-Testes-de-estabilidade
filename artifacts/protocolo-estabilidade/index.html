<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Protocolo de Estabilidade</title>
    <meta name="description" content="Sistema de gestão de protocolos de estabilidade para suplementos alimentares em cápsula — Alphafitus Laboratório Nutracêutico." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">

    <!--
      PRE-REACT STORAGE SANITISER
      Runs synchronously before any JavaScript bundle loads, on EVERY page load.

      TWO independent jobs:
      A) ALWAYS-ON CLEANUP  — strips certTitle / docTitle / lbl_* from every
         cert_edits_v3_* key and deletes all cert_edits_v1/v2 keys.
         This runs unconditionally so that even if the browser caches an old JS
         bundle that still reads certTitle from cert_edits_v3, it will ALWAYS
         find the field absent and fall back to "Certificado de Análise".
      B) VERSION-GATED REDIRECT — when the stored app version differs from
         APP_VER, forces a hard navigation with a cache-bust query param so the
         browser discards its cached JS bundle and fetches the current one.
    -->
    <script>
      (function () {
        var BAD_FIELDS = ["certTitle", "docTitle"];
        var APP_VER   = "20260526-005";

        /* ── Nuclear scan ────────────────────────────────────────────────────
           Known autofill-corrupted substrings (case-insensitive).
           For cert_edits_v3_* we scan each FIELD VALUE individually so that
           only the bad field is removed — valid edits are preserved. */
        var BAD_SUBSTRS = ["BIS DE ANAL", "GENT DA CAPSULA"];
        /* Strip Portuguese/French diacritics before substring matching so that
           "ANÁLISE" (with accented Á) matches "ANAL" and "CÁPSULA" matches "CAPSULA". */
        function stripAccents(str) {
          try { return str.normalize("NFD").replace(/[\u0300-\u036f]/g, ""); }
          catch(e) { return str; }
        }
        function containsBad(str) {
          var up = stripAccents((str || "").toUpperCase());
          for (var b = 0; b < BAD_SUBSTRS.length; b++) {
            if (up.indexOf(BAD_SUBSTRS[b]) !== -1) return true;
          }
          return false;
        }
        try {
          var nuclearDelete = [];
          for (var n = 0; n < localStorage.length; n++) {
            var nk = localStorage.key(n);
            if (!nk) continue;
            var nv = localStorage.getItem(nk) || "";
            if (nk.indexOf("cert_edits_v3_") === 0) {
              /* Parse JSON and purge only corrupted individual field values */
              try {
                var obj = JSON.parse(nv);
                var dirty = false;
                var objKeys = Object.keys(obj);
                for (var ok = 0; ok < objKeys.length; ok++) {
                  if (typeof obj[objKeys[ok]] === "string" && containsBad(obj[objKeys[ok]])) {
                    delete obj[objKeys[ok]]; dirty = true;
                  }
                }
                if (dirty) localStorage.setItem(nk, JSON.stringify(obj));
              } catch(e) {}
            } else if (containsBad(nv)) {
              /* For other keys (e.g. cert_custom_title_*), delete if value is bad */
              nuclearDelete.push(nk);
            }
          }
          for (var nd = 0; nd < nuclearDelete.length; nd++) {
            try { localStorage.removeItem(nuclearDelete[nd]); } catch(e) {}
          }
        } catch(e) {}
        var VER_KEY   = "__alpha_app_ver";

        try {
          /* ── A) ALWAYS-ON: sanitise every cert_edits_v3_* entry ─────────── */
          var toDelete = [];
          for (var i = 0; i < localStorage.length; i++) {
            var k = localStorage.key(i);
            if (!k) continue;
            if (k.startsWith("cert_edits") && k.indexOf("cert_edits_v3_") !== 0) {
              /* Old v1 / v2 keys — delete entirely */
              toDelete.push(k);
            } else if (k.indexOf("cert_edits_v3_") === 0) {
              /* v3 key — strip bad fields in-place */
              try {
                var obj = JSON.parse(localStorage.getItem(k) || "{}");
                var dirty = false;
                for (var b = 0; b < BAD_FIELDS.length; b++) {
                  if (BAD_FIELDS[b] in obj) { delete obj[BAD_FIELDS[b]]; dirty = true; }
                }
                var flds = Object.keys(obj);
                for (var f = 0; f < flds.length; f++) {
                  if (flds[f].indexOf("lbl_") === 0) { delete obj[flds[f]]; dirty = true; }
                }
                if (dirty) localStorage.setItem(k, JSON.stringify(obj));
              } catch (e) {}
            }
          }
          for (var d = 0; d < toDelete.length; d++) {
            try { localStorage.removeItem(toDelete[d]); } catch (e) {}
          }
          /* Clean up stale migration marker */
          try { localStorage.removeItem("cert_lbl_migration_v"); } catch (e) {}

          /* ── B) VERSION-GATED: redirect to force fresh JS bundle ─────────── */
          var stored = localStorage.getItem(VER_KEY);
          localStorage.setItem(VER_KEY, APP_VER);
          if (stored !== null && stored !== APP_VER) {
            /* Append a cache-busting param to the current URL and hard-navigate.
               The new URL won't be in the browser cache, so the server always
               serves the fresh response (with no-store headers). */
            var base = location.pathname;
            /* Strip any existing _v param to avoid stacking */
            var qs = location.search.replace(/[?&]_v=[^&]*/g, "").replace(/^\?$/, "");
            var sep = qs ? "&" : "?";
            location.replace(base + qs + sep + "_v=" + APP_VER + location.hash);
          }
        } catch (e) { /* silently ignore any storage / navigation errors */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
