openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Stability Protocol Management API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: protocols
    description: Stability protocol management
  - name: lots
    description: Protocol lot management
  - name: results
    description: Analysis results
  - name: certificates
    description: Certificate of analysis
  - name: methodologies
    description: Methodology reference library
  - name: attachments
    description: Protocol document attachments
  - name: storage
    description: Object storage upload and serving endpoints
  - name: catalog
    description: Reference catalog (container types, capsule types)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /storage/uploads/request-url:
    post:
      tags: [storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'

  /storage/objects/{objectPath}:
    get:
      tags: [storage]
      operationId: getStorageObject
      summary: Serve an uploaded object
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content
          content:
            '*/*':
              schema:
                type: string
                format: binary

  /protocols/{id}/attachments:
    get:
      operationId: listAttachments
      tags: [attachments]
      summary: List protocol attachments
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: List of attachments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProtocolAttachment'
    post:
      operationId: createAttachment
      tags: [attachments]
      summary: Register a new attachment after upload
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAttachmentBody'
      responses:
        '201':
          description: Attachment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProtocolAttachment'

  /protocols/{id}/attachments/{attachmentId}:
    patch:
      operationId: updateAttachment
      tags: [attachments]
      summary: Update attachment name or description
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: attachmentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAttachmentBody'
      responses:
        '200':
          description: Updated attachment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProtocolAttachment'
    delete:
      operationId: deleteAttachment
      tags: [attachments]
      summary: Delete a protocol attachment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: attachmentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean

  /protocols:
    get:
      operationId: listProtocols
      tags: [protocols]
      summary: List all protocols
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [rascunho, em_andamento, concluido, aprovado, aprovado_com_ressalva, reprovado]
        - name: nonConformes
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of protocols
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Protocol"
    post:
      operationId: createProtocol
      tags: [protocols]
      summary: Create a new protocol
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProtocolBody"
      responses:
        "201":
          description: Protocol created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Protocol"

  /protocols/stats:
    get:
      operationId: getProtocolStats
      tags: [protocols]
      summary: Get protocol dashboard stats
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProtocolStats"

  /protocols/{id}:
    get:
      operationId: getProtocol
      tags: [protocols]
      summary: Get protocol by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Protocol
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProtocolDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateProtocol
      tags: [protocols]
      summary: Update a protocol
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProtocolBody"
      responses:
        "200":
          description: Updated protocol
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Protocol"
    delete:
      operationId: deleteProtocol
      tags: [protocols]
      summary: Delete a protocol
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /protocols/{id}/lots:
    get:
      operationId: listLots
      tags: [lots]
      summary: List lots for a protocol
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of lots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Lot"
    post:
      operationId: createLot
      tags: [lots]
      summary: Add a lot to a protocol
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLotBody"
      responses:
        "201":
          description: Lot created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lot"

  /protocols/{id}/lots/{lotId}:
    put:
      operationId: updateLot
      tags: [lots]
      summary: Update a lot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: lotId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLotBody"
      responses:
        "200":
          description: Updated lot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lot"
    delete:
      operationId: deleteLot
      tags: [lots]
      summary: Delete a lot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: lotId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /protocols/{id}/results:
    get:
      operationId: listResults
      tags: [results]
      summary: Get all analysis results for a protocol
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Analysis results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnalysisResult"
    post:
      operationId: upsertResult
      tags: [results]
      summary: Create or update an analysis result
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertResultBody"
      responses:
        "200":
          description: Result saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisResult"

  /protocols/{id}/results/{resultId}:
    delete:
      operationId: deleteResult
      tags: [results]
      summary: Delete an analysis result
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: resultId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /protocols/{id}/kinetics:
    get:
      operationId: getKinetics
      tags: [protocols]
      summary: Get kinetic modeling calculations for a protocol
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Kinetic modeling results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KineticsResult"

  /protocols/{id}/certificate:
    get:
      operationId: getCertificate
      tags: [certificates]
      summary: Get certificate of analysis data for a protocol
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Certificate data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Certificate"

  /protocols/{id}/signatures:
    get:
      operationId: listSignatures
      tags: [protocols]
      summary: List electronic signatures for a protocol
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of signatures
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProtocolSignature"
    post:
      operationId: addSignature
      tags: [protocols]
      summary: Add an electronic signature to a protocol
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddSignatureBody"
      responses:
        "201":
          description: Signature created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProtocolSignature"

  /protocols/{id}/signatures/{sigId}:
    delete:
      operationId: deleteSignature
      tags: [protocols]
      summary: Remove an electronic signature
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: sigId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Signature removed
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean

  /protocols/{id}/finalize:
    post:
      operationId: finalizeProtocol
      tags: [protocols]
      summary: Finalize a protocol with approval status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FinalizeProtocolBody"
      responses:
        "200":
          description: Protocol finalized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Protocol"

  /methodologies:
    get:
      operationId: listMethodologies
      tags: [methodologies]
      summary: List all saved methodology references
      responses:
        "200":
          description: List of methodologies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Methodology"
    post:
      operationId: createMethodology
      tags: [methodologies]
      summary: Save a new methodology reference
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMethodologyBody"
      responses:
        "201":
          description: Methodology created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Methodology"

  /methodologies/{id}:
    put:
      operationId: updateMethodology
      tags: [methodologies]
      summary: Update a methodology reference
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMethodologyBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Methodology"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteMethodology
      tags: [methodologies]
      summary: Delete a methodology reference
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /catalog/container-types:
    get:
      operationId: listContainerTypes
      tags: [catalog]
      summary: List container types
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CatalogItem"
    post:
      operationId: createContainerType
      tags: [catalog]
      summary: Create a container type
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CatalogItemInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogItem"

  /catalog/container-types/{id}:
    put:
      operationId: updateContainerType
      tags: [catalog]
      summary: Update a container type
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CatalogItemInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogItem"
    delete:
      operationId: deleteContainerType
      tags: [catalog]
      summary: Delete a container type
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted

  /catalog/capsule-types:
    get:
      operationId: listCapsuleTypes
      tags: [catalog]
      summary: List capsule types
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CatalogItem"
    post:
      operationId: createCapsuleType
      tags: [catalog]
      summary: Create a capsule type
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CatalogItemInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogItem"

  /catalog/capsule-types/{id}:
    put:
      operationId: updateCapsuleType
      tags: [catalog]
      summary: Update a capsule type
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CatalogItemInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogItem"
    delete:
      operationId: deleteCapsuleType
      tags: [catalog]
      summary: Delete a capsule type
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted

  /catalog/product-types:
    get:
      operationId: listProductTypes
      tags: [catalog]
      summary: List product types
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductTypeItem"
    post:
      operationId: createProductType
      tags: [catalog]
      summary: Create a product type
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductTypeInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductTypeItem"

  /catalog/product-types/{id}:
    put:
      operationId: updateProductType
      tags: [catalog]
      summary: Update a product type
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductTypeInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductTypeItem"
    delete:
      operationId: deleteProductType
      tags: [catalog]
      summary: Delete a product type
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted

  /ativo-references:
    get:
      operationId: listAtivoReferences
      tags: [ativo-references]
      summary: List all ANVISA active ingredient reference limits
      responses:
        "200":
          description: List of ativo references
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AtivoReference"
    post:
      operationId: createAtivoReference
      tags: [ativo-references]
      summary: Create an ativo reference limit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AtivoReferenceInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AtivoReference"

  /ativo-references/lookup:
    get:
      operationId: lookupAtivoReference
      tags: [ativo-references]
      summary: Lookup ativo reference by parameter name
      parameters:
        - name: parameter
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Matching references
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AtivoReference"

  /ativo-references/{id}:
    put:
      operationId: updateAtivoReference
      tags: [ativo-references]
      summary: Update an ativo reference
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AtivoReferenceInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AtivoReference"
        "404":
          description: Not found
    delete:
      operationId: deleteAtivoReference
      tags: [ativo-references]
      summary: Delete an ativo reference
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /bibliographic-references:
    get:
      operationId: listBibliographicReferences
      tags: [bibliographic-references]
      summary: List all bibliographic references
      responses:
        "200":
          description: List of references
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BibliographicReference"
    post:
      operationId: createBibliographicReference
      tags: [bibliographic-references]
      summary: Create a bibliographic reference
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BibliographicReferenceInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BibliographicReference"

  /bibliographic-references/{id}:
    put:
      operationId: updateBibliographicReference
      tags: [bibliographic-references]
      summary: Update a bibliographic reference
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BibliographicReferenceInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BibliographicReference"
        "404":
          description: Not found
    delete:
      operationId: deleteBibliographicReference
      tags: [bibliographic-references]
      summary: Delete a bibliographic reference
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted

  /protocols/{id}/bibliographic-references:
    get:
      operationId: listProtocolBibliographicReferences
      tags: [bibliographic-references]
      summary: List bibliographic references linked to a protocol
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of references for this protocol
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BibliographicReference"
    post:
      operationId: addProtocolBibliographicReference
      tags: [bibliographic-references]
      summary: Link a reference to a protocol
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddProtocolReferenceBody"
      responses:
        "201":
          description: Linked
        "409":
          description: Already linked

  /protocols/{id}/bibliographic-references/{refId}:
    delete:
      operationId: removeProtocolBibliographicReference
      tags: [bibliographic-references]
      summary: Unlink a reference from a protocol
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: refId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Unlinked

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Protocol:
      type: object
      properties:
        id:
          type: integer
        certNumber:
          type: string
          description: e.g. CERT-AF-20241210/035
        companyName:
          type: string
        cnpj:
          type: string
        ie:
          type: string
        address:
          type: string
        cep:
          type: string
        productName:
          type: string
        productType:
          type: string
        packagingType:
          type: string
        activeIngredients:
          type: string
        excipients:
          type: string
        capsuleComposition:
          type: string
        studyStartDate:
          type: string
        studyEndDate:
          type: string
        studyObjective:
          type: string
        storageTemp:
          type: string
        storageHumidity:
          type: string
        studyPeriodMonths:
          type: integer
        testIntervals:
